---
# tasks file for ansible/roles/nfs-client

- name: Set runtime hostname
  ansible.builtin.command: hostname {{ hostname }}

- name: Persist hostname in rc.conf
  ansible.builtin.lineinfile:
    path: /etc/rc.conf
    regexp: "^hostname="
    line: 'hostname="{{ hostname }}"'
    create: yes

# - name: Set hostname with sysrc
#   ansible.builtin.command: sysrc hostname={{ hostname }}

# - name: Apply hostname immediately
#   ansible.builtin.command: hostname {{ hostname }}

- name: Install packages
  community.general.pkgng:
    name: "{{ item }}"
    state: present
  loop: "{{ packages }}"

- name: Allow wheel group sudo without password
  ansible.builtin.lineinfile:
    path: /usr/local/etc/sudoers
    regexp: '^# %wheel ALL=\(ALL\) ALL'
    line: "%wheel ALL=(ALL) NOPASSWD: ALL"
    validate: "/usr/local/sbin/visudo -cf %s"

# - name: Add group
#   ansible.builtin.group:
#     name: crew
#     state: present

# - name: Add group
#   ansible.builtin.group:
#     name: "{{ item }}"
#     state: present
#   loop: "{{ accounts }}"

- name: Create group
  ansible.builtin.group:
    name: "{{ item.name }}"
    gid: "{{ item.gid }}"
  loop: "{{ accounts }}"

- name: Create user
  ansible.builtin.user:
    name: "{{ item.name }}"
    uid: "{{ item.uid }}"
    group: "{{ item.gid }}"
    shell: /bin/tcsh
    state: present
    password: "{{ 'valentine' | password_hash('sha512') }}"
  loop: "{{ accounts }}"

- name: Add existing users to wheel group
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: wheel
    append: true
  loop: "{{ accounts }}"

- name: Create directory
  file:
    path: "/mnt/nfs"
    owner: root
    group: wheel
    state: directory

- name: Create directory
  file:
    path: "/mnt/nfs/{{ item.name }}"
    owner: "{{ item.uid }}"
    group: "{{ item.gid }}"
    state: directory
  loop: "{{ accounts }}"

- name: Mount directories
  ansible.posix.mount:
    src: "{{ nfs }}:/nfs/{{ item.name }}"
    path: "/mnt/nfs/{{ item.name }}"
    state: mounted
    fstype: nfs
    opts: rw
  loop: "{{ accounts }}"
  tags:
    - mount

- name: Enable nfs at boot
  community.general.sysrc:
    name: nfs_client_enable
    value: "YES"

- name: Update tcsh prompt
  ansible.builtin.replace:
    path: "/home/{{ item.name }}/.cshrc"
    regexp: '^\t*set\s+prompt\s*=.*'
    replace: '\tset prompt="\\n%{\033[0;32m%}%n@%m:%{\033[0;33m%}%~%{\033[1;30m%}>%{\033[1;37m%} "'
    owner: "{{ item.uid }}"
    group: "{{ item.gid }}"
  loop: "{{ accounts }}"

- name: Ensure emacs directory exists
  ansible.builtin.file:
    path: "/home/{{ item.name }}/.emacs.d"
    state: directory
    owner: "{{ item.uid }}"
    group: "{{ item.gid }}"
    mode: "0755"
  loop: "{{ accounts }}"

- name: Copy init.el
  ansible.builtin.template:
    src: init-v6.el.j2
    dest: "/home/{{ item.name }}/.emacs.d/init.el"
    owner: "{{ item.uid }}"
    group: "{{ item.gid }}"
    mode: "0644"
  loop: "{{ accounts }}"

- name: Create a symbolic link
  ansible.builtin.file:
    src: "/mnt/nfs/{{ item.name }}/"
    dest: "/home/{{ item.name }}/projects"
    owner: "{{ item.uid }}"
    state: link
  loop: "{{ accounts }}"
